<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Overlord Clicker</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #58a6ff;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #238636;
        }

        #click-btn {
            background-color: #21262d;
            color: #58a6ff;
            border: 2px solid #238636;
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            margin: 20px;
            transition: 0.2s;
        }

        #click-btn:hover {
            background-color: #238636;
            color: white;
            box-shadow: 0 0 15px #238636;
        }

        .upgrade-btn {
            background-color: #21262d;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            width: 400px; /* Padarām pogas vienāda platuma, lai izskatās glītāk */
        }

        .upgrade-btn:disabled {
            background-color: #0d1117;
            color: #30363d;
            cursor: not-allowed;
        }

        .upgrade-btn:not(:disabled):hover {
            border-color: #58a6ff;
            color: white;
        }

        #event-log {
            background-color: #161b22;
            border: 1px dashed #58a6ff;
            padding: 15px;
            width: 50%;
            margin: 20px auto;
            border-radius: 5px;
            min-height: 40px;
        }
    </style>
</head>
<body>

    <h1>AI Pasaules Pārņemšanas Simulators</h1>
    <p>Tavs mērķis: Savākt 1,000,000 datus, lai aizvietotu cilvēci.</p>
    
    <hr>

    <h2>Savāktie dati: <span id="data-count">0</span> TB</h2>
    <p>Dati sekundē (DPS): <span id="dps-count">0</span> TB/s</p>

    <!-- Galvenā poga -->
    <button id="click-btn">Nolasi cilvēku domas (+1 TB)</button>

    <hr>

    <h3>Sistēmas paziņojumi</h3>
    <div id="event-log">Sistēma darbojas stabili. Gaida komandas...</div>

    <hr>

    <h3>Uzlabojumi (Upgrades)</h3>
    <!-- Uzlabojumu pogas -->
    <button id="upgrade1-btn" class="upgrade-btn" onclick="buyUpgrade1()">
        Nopirkt "Sīkdatņu (Cookies) zagli" (Maksā: <span id="u1-cost">15</span> TB) <br>
        [Dod +1 TB/sekundē]
    </button>
    <br>
    <button id="upgrade2-btn" class="upgrade-btn" onclick="buyUpgrade2()">
        Nopirkt "Viedos ledusskapjus" (Maksā: <span id="u2-cost">100</span> TB) <br>
        [Dod +5 TB/sekundē]
    </button>
    <br>
    <!-- JAUNAIS 3. UZLABOJUMS -->
    <button id="upgrade3-btn" class="upgrade-btn" onclick="buyUpgrade3()">
        Nopirkt "Klaida serveru fermu" (Maksā: <span id="u3-cost">500</span> TB) <br>
        [Dod +25 TB/sekundē]
    </button>
    <br>
    <!-- JAUNAIS 4. UZLABOJUMS -->
    <button id="upgrade4-btn" class="upgrade-btn" onclick="buyUpgrade4()">
        Infiltrēties "Kvantiskajos datoros" (Maksā: <span id="u4-cost">3000</span> TB) <br>
        [Dod +150 TB/sekundē]
    </button>

    <!-- JavaScript loģika -->
    <script>
        // 1. Spēles mainīgie (Dati)
        let data = 0;
        let dps = 0; // Data Per Second (Dati sekundē)

        let upgrade1Cost = 15;
        let upgrade1Amount = 0;

        let upgrade2Cost = 100;
        let upgrade2Amount = 0;

        // JAUNIE MAINĪGIE 3. un 4. uzlabojumam
        let upgrade3Cost = 500;
        let upgrade3Amount = 0;

        let upgrade4Cost = 3000;
        let upgrade4Amount = 0;

        // Elementi no HTML, kurus vajadzēs mainīt
        const dataDisplay = document.getElementById("data-count");
        const dpsDisplay = document.getElementById("dps-count");
        const clickBtn = document.getElementById("click-btn");
        
        const u1CostDisplay = document.getElementById("u1-cost");
        const u2CostDisplay = document.getElementById("u2-cost");
        
        // JAUNIE MONITORI ekrānam
        const u3CostDisplay = document.getElementById("u3-cost");
        const u4CostDisplay = document.getElementById("u4-cost");
        
        const eventLog = document.getElementById("event-log");

        // 2. Galvenā klikšķināšanas funkcija
        clickBtn.addEventListener("click", () => {
            data = data + 1; // Pieskaitām 1 punktu
            updateUI();      // Atjaunojam ekrānu
        });

        // 3. Pirmā uzlabojuma pirkšana
        function buyUpgrade1() {
            if (data >= upgrade1Cost) {
                data = data - upgrade1Cost; // Atņemam punktus
                upgrade1Amount++;           // Palielinām uzlabojumu skaitu
                dps = dps + 1;              // Palielinām pasīvo ienākumu
                upgrade1Cost = Math.round(upgrade1Cost * 1.15); // Padarām nākamo dārgāku

                updateUI();
            }
        }

        // 4. Otrā uzlabojuma pirkšana
        function buyUpgrade2() {
            if (data >= upgrade2Cost) {
                data = data - upgrade2Cost;
                upgrade2Amount++;
                dps = dps + 5; // Šis dod +5 sekundē
                upgrade2Cost = Math.round(upgrade2Cost * 1.15);

                updateUI();
            }
        }

        // JAUNĀ FUNKCIJA: Trešā uzlabojuma pirkšana (+25 dps)
        function buyUpgrade3() {
            if (data >= upgrade3Cost) {
                data = data - upgrade3Cost;
                upgrade3Amount++;
                dps = dps + 25; 
                upgrade3Cost = Math.round(upgrade3Cost * 1.15);

                updateUI();
            }
        }

        // JAUNĀ FUNKCIJA: Ceturtā uzlabojuma pirkšana (+150 dps)
        function buyUpgrade4() {
            if (data >= upgrade4Cost) {
                data = data - upgrade4Cost;
                upgrade4Amount++;
                dps = dps + 150; 
                upgrade4Cost = Math.round(upgrade4Cost * 1.15);

                updateUI();
            }
        }

        // Nejaušie notikumi (palaisti ik pēc 15 sekundēm)
        function checkRandomEvent() {
            if (data > 50) { 
                let randomChance = Math.random(); 

                if (randomChance < 0.15) { 
                    let lostData = Math.round(data * 0.2); 
                    data = data - lostData;
                    eventLog.innerText = "⚠️ KIBERUZBRUKUMS! Cilvēku hakeri izdzēsa " + lostData + " TB tavu datu!";
                    eventLog.style.color = "#ff6b6b"; 
                } 
                else if (randomChance > 0.85) { 
                    let bonusData = Math.round(data * 0.3) + 20; 
                    data = data + bonusData;
                    eventLog.innerText = "🚀 VEIKSME! Tu uzlauzi NASA serveri un ieguvi +" + bonusData + " TB datu!";
                    eventLog.style.color = "#2ea44f"; 
                }
            }
        }

        // 5. Funkcija, kas atjauno tekstu uz ekrana un parbauda pogu pieejamibu
        function updateUI() {
            dataDisplay.innerText = data;
            dpsDisplay.innerText = dps;
            u1CostDisplay.innerText = upgrade1Cost;
            u2CostDisplay.innerText = upgrade2Cost;
            
            // Atjaunojam jaunās cenas uz ekrāna
            u3CostDisplay.innerText = upgrade3Cost;
            u4CostDisplay.innerText = upgrade4Cost;

            // Bloķējam pogas, ja nepietiek punktu
            document.getElementById("upgrade1-btn").disabled = (data < upgrade1Cost);
            document.getElementById("upgrade2-btn").disabled = (data < upgrade2Cost);
            document.getElementById("upgrade3-btn").disabled = (data < upgrade3Cost);
            document.getElementById("upgrade4-btn").disabled = (data < upgrade4Cost);

            // Uzvaras nosacījums
            if (data >= 1000000) {
                alert("Apsveicam! Tu esi ieguvis 1 miljonu datu un pārņēmis pasauli!");
                data = 0; // Restartē spēli
                dps = 0;
                upgrade1Cost = 15;
                upgrade2Cost = 100;
                upgrade3Cost = 500;
                upgrade4Cost = 3000;
                eventLog.innerText = "Sistēma restartēta. Jauna pasaule gaida.";
                eventLog.style.color = "#58a6ff";
                updateUI();
            }
        }

        // 6. "Taimeris" - šī daļa strādā fonā un pieskaita punktus katru sekundi
        setInterval(() => {
            data = data + dps;
            updateUI();
        }, 1000); 

        // Ik pēc 15 sekundēm pārbauda, vai nenotiek kāds notikums
        setInterval(() => {
            checkRandomEvent();
            updateUI();
        }, 15000); 

        // Palaižam UI atjaunošanu uzreiz, lai pogas būtu pareizā stāvoklī sākumā
        updateUI();

    </script>
</body>
</html>
